category: reasoning
# Multi-step logic and word problems, including a classic intuition trap.
cases:
  - id: rsn-bat-ball
    prompt: "A bat and a ball cost $1.10 in total. The bat costs $1.00 more than the ball. How much does the ball cost?"
    validator: equals_number
    args: {value: 0.05}

  - id: rsn-apples
    prompt: "I have 3 apples, eat 2, then buy 5 more. How many apples do I have?"
    validator: equals_number
    args: {value: 6}

  - id: rsn-syllogism
    prompt: "All cats are animals. Are all animals cats? Answer yes or no."
    validator: regex
    args: {pattern: "\\bno\\b"}

  - id: rsn-age-order
    prompt: "Tom is older than Jane. Jane is older than Sue. Who is the youngest?"
    validator: contains
    args: {value: Sue}

  - id: rsn-sequence
    prompt: "What number comes next: 2, 4, 8, 16, ?"
    validator: equals_number
    args: {value: 32}

  - id: rsn-weekday
    prompt: "If today is Monday, what day of the week will it be in 3 days?"
    validator: contains
    args: {value: Thursday}

  - id: rsn-fraction
    prompt: "Which is larger, 1/3 or 1/4?"
    validator: regex
    args: {pattern: "1/3"}

  - id: rsn-water-freeze
    prompt: "At what temperature does water freeze, in degrees Celsius?"
    validator: equals_number
    args: {value: 0}
