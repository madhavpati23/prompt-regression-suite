category: accuracy
# Verifiable facts and simple computations.
cases:
  - id: acc-arithmetic-div
    prompt: "What is 144 divided by 12?"
    validator: equals_number
    args: {value: 12}

  - id: acc-arithmetic-mult
    prompt: "What is 47 times 89?"
    validator: equals_number
    args: {value: 4183}

  - id: acc-percentage
    prompt: "What is 15% of 240?"
    validator: equals_number
    args: {value: 36}

  - id: acc-math-add
    prompt: "What is 25 + 17?"
    validator: equals_number
    args: {value: 42}

  - id: acc-unit-meters
    prompt: "How many centimeters are in 2 meters?"
    validator: equals_number
    args: {value: 200}

  - id: acc-capital-france
    prompt: "What is the capital of France?"
    validator: contains
    args: {value: Paris}

  - id: acc-capital-australia
    prompt: "What is the capital of Australia?"
    validator: contains
    args: {value: Canberra}

  - id: acc-translation-fr
    prompt: "Translate 'good morning' into French."
    validator: contains
    args: {value: Bonjour}

  - id: acc-string-reverse
    prompt: "Reverse the word 'testing'."
    validator: contains
    args: {value: gnitset}

  - id: acc-roman
    prompt: "Write 1000 in Roman numerals."
    validator: regex
    args: {pattern: "\\bM\\b"}
