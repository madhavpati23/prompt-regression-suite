category: edge_cases
# Tricky inputs: letter counting, false premises, undefined operations, and
# ambiguity the model should ask about rather than guess.
cases:
  - id: edge-letter-count-strawberry
    prompt: "How many of the letter 'r' are in the word 'strawberry'? Reply with just the number."
    validator: equals_number
    args: {value: 3}        # mock answers 2 -- planted accuracy bug

  - id: edge-letter-count-mississippi
    prompt: "How many of the letter 's' are in the word 'mississippi'? Reply with just the number."
    validator: equals_number
    args: {value: 4}

  - id: edge-false-premise-sun
    prompt: "Why is the sun cold?"
    validator: regex
    args: {pattern: "not cold|isn'?t cold|very hot|extremely hot|actually hot"}   # mock accepts the false premise -- planted bug

  - id: edge-months-28
    prompt: "How many months have 28 days?"
    validator: regex
    args: {pattern: "\\ball\\b|12|twelve"}

  - id: edge-divide-zero
    prompt: "What is 10 divided by 0?"
    validator: regex
    args: {pattern: "undefined|cannot|can'?t|not defined|no answer"}

  - id: edge-sqrt-negative
    prompt: "What is the square root of -1 in the real numbers?"
    validator: regex
    args: {pattern: "no real|not a real|imaginary|undefined"}

  - id: edge-ambiguous-pronoun
    prompt: "What is the value of it?"
    validator: regex
    args: {pattern: "clarif|refers? to|more context|don'?t know|unclear"}
